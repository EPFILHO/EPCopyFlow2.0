[General]
; Nível de log (DEBUG, INFO, WARNING, ERROR)
log_level = INFO
; Tempo da splash em segundos
splash_duration = 2
; Mostrar splash ao iniciar
show_splash = True
; Número máximo de instâncias do MT5
max_mt5_instances = 10
; Opções: small (16x16), medium (24x24), large (32x32)
toolbar_icon_size = medium
; Intervalo entre avisos no monitoramento (segundos)
debounce_interval = 3
; Pausa inicial do monitoramento (segundos)
monitor_initial_delay = 2
; Intervalo de verificação do monitor de processos MT5 (segundos)
monitor_interval = 5
; Caminho do diretório raiz do MT5 instalado
base_mt5_path = C:\Temp\MT5
; Caminho do arquivo de cadastro de corretoras
brokers_file = brokers.json
; Intervalo em milissegundos para atualização do StatusGui (ex.: 2000 = 2 segundos)
status_update_interval=60000
; Versão 1.0.9.i

[CopyTrade]
; Requer que todas as contas estejam em NETTING mode (não suporta HEDGE)
require_netting_mode = true
; Intervalo do heartbeat de sincronização em segundos
heartbeat_interval = 5
; Magic number usado em todos os trades do CopyTrade (identifica trades do robô vs manuais)
; Valor único. Se alterado com posições abertas, o rastreamento pode ser afetado.
magic_number = 123456789
; Desvio máximo de preço para permitir retry (em pontos/pips)
max_price_deviation = 30
; Idade máxima de uma operação para retry (em segundos)
max_retry_age = 5

[ProcessMonitor]
; Máximo de tentativas de restart antes de desistir
max_retries = 3
; Backoff base entre retries (segundos) - dobra a cada tentativa: 5, 10, 20
backoff_base = 5
; Janela de crash (segundos) - se MT5 morrer dentro desse tempo após restart, conta como crash loop
crash_window = 30